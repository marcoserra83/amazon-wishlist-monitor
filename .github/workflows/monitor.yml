name: Amazon Wishlist Monitor

on:
  workflow_dispatch:

concurrency:
  group: amazon-wishlist-monitor
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable secret masking
        run: |
          echo "::remove-matcher owner=secret-matcher::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD }}
          WISHLIST_URL: ${{ secrets.WISHLIST_URL }}
          DEBUG_HTML: ${{ secrets.DEBUG_HTML }}
        run: |
          mkdir -p debug_output
          mkdir -p debug_html
          python monitor.py

      - name: Upload debug_output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug_output/
          if-no-files-found: ignore

      - name: Upload debug_html artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_html/
          if-no-files-found: ignore

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add prices.json
          git commit -m "Update prices.json" || echo "No changes to commit"

          # Fetch and rebase to avoid conflicts
          git fetch origin
          git rebase origin/main || git rebase --abort

          git push origin HEAD:main || echo "Push failed"
